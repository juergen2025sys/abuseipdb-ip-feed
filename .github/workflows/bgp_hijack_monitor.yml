name: BGP Hijack Monitor

on:
  schedule:
    - cron: '15 */6 * * *'  # läuft VOR dem Blacklist-Workflow (der läuft um :00)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bgp-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Run BGP Hijack Monitor & Build Compromise List
        run: |
          python3 << 'EOF'
          import urllib.request
          import urllib.error
          import json
          import re
          import os
          import time
          import ipaddress
          from datetime import datetime, timezone

          now = datetime.now(timezone.utc)
          now_str = now.strftime("%Y-%m-%d %H:%M UTC")

          # ══════════════════════════════════════════════════════════════════
          # HILFSFUNKTIONEN
          # ══════════════════════════════════════════════════════════════════

          def fetch(url, timeout=20):
              try:
                  req = urllib.request.Request(url, headers={
                      "User-Agent": "BGPHijackMonitor/2.0 (github-actions; security-research)",
                      "Accept": "application/json"
                  })
                  with urllib.request.urlopen(req, timeout=timeout) as r:
                      return json.loads(r.read().decode("utf-8", errors="ignore")), r.status
              except urllib.error.HTTPError as e:
                  return None, e.code
              except Exception as e:
                  return None, str(e)

          def is_private(entry):
              try:
                  ip_str = entry.split("/")[0]
                  ip = ipaddress.ip_address(ip_str)
                  return ip.is_private or ip.is_loopback or ip.is_multicast or ip.is_reserved
              except:
                  return True

          def cidr_to_ips_sample(cidr, max_ips=256):
              try:
                  net = ipaddress.ip_network(cidr, strict=False)
                  hosts = list(net.hosts())
                  if len(hosts) > max_ips:
                      step = max(1, len(hosts) // max_ips)
                      hosts = hosts[::step][:max_ips]
                  return [str(h) for h in hosts]
              except:
                  return []

          # ══════════════════════════════════════════════════════════════════
          # SCHRITT 1: Hijacker-ASNs aus BGP-Feeds sammeln
          # ══════════════════════════════════════════════════════════════════

          print("=" * 60)
          print("SCHRITT 1: BGP-Feeds abfragen")
          print("=" * 60)

          hijacker_asns = {}  # ASN -> {"sources": [...], "prefixes": set()}

          # ── Feed 1: Cloudflare Radar ──────────────────────────────────────
          print("\n[1/2] Cloudflare Radar BGP Hijack Events (letzte 3 Tage)...")
          cf_data, cf_status = fetch(
              "https://api.cloudflare.com/client/v4/radar/bgp/hijacks/events"
              "?dateRange=3d&per_page=200&confidence=medium,high"
          )
          cf_found = 0
          if cf_data:
              events = (cf_data.get("result", {}).get("asns_events") or
                        cf_data.get("result", {}).get("events") or [])
              for ev in events:
                  asn = str(ev.get("hijackerAsn", ev.get("hijacker_asn", "")))
                  prefix = ev.get("prefix", "")
                  if asn and asn not in ("None", ""):
                      key = f"AS{asn}"
                      if key not in hijacker_asns:
                          hijacker_asns[key] = {"sources": [], "prefixes": set()}
                      if "cloudflare_radar" not in hijacker_asns[key]["sources"]:
                          hijacker_asns[key]["sources"].append("cloudflare_radar")
                      if prefix:
                          hijacker_asns[key]["prefixes"].add(prefix)
                      cf_found += 1
              print(f"   → {cf_found} Events → {len(hijacker_asns)} Hijacker-ASNs")
          else:
              print(f"   → Fehler (HTTP {cf_status})")

          # ── Feed 2: BGPStream CAIDA ───────────────────────────────────────
          print("\n[2/2] BGPStream CAIDA Hijack Events...")
          bs_data, bs_status = fetch(
              "https://bgpstream.crossroads.exchange/api/events?type=hijack&limit=100"
          )
          bs_found = 0
          if bs_data:
              events = bs_data if isinstance(bs_data, list) else (
                  bs_data.get("events") or bs_data.get("data") or []
              )
              for ev in events:
                  as_path = ev.get("as_path", ev.get("origin_as", []))
                  prefix = ev.get("prefix", ev.get("more_specific_prefix", ""))
                  if isinstance(as_path, list) and as_path:
                      asn = str(as_path[-1])
                  elif isinstance(as_path, str):
                      parts = as_path.split()
                      asn = parts[-1] if parts else ""
                  else:
                      asn = str(as_path) if as_path else ""
                  if asn and re.match(r'^\d+$', asn):
                      key = f"AS{asn}"
                      if key not in hijacker_asns:
                          hijacker_asns[key] = {"sources": [], "prefixes": set()}
                      if "bgpstream_caida" not in hijacker_asns[key]["sources"]:
                          hijacker_asns[key]["sources"].append("bgpstream_caida")
                      if prefix:
                          hijacker_asns[key]["prefixes"].add(prefix)
                      bs_found += 1
              print(f"   → {bs_found} Events verarbeitet")
          else:
              print(f"   → Fehler (HTTP {bs_status})")

          print(f"\n✅ Gesamt erkannte Hijacker-ASNs: {len(hijacker_asns)}")

          # ══════════════════════════════════════════════════════════════════
          # SCHRITT 2: Pro ASN alle angekündigten Prefixes via RIPE holen
          # ══════════════════════════════════════════════════════════════════

          print("\n" + "=" * 60)
          print("SCHRITT 2: Prefixes & IPs pro Hijacker-ASN auflösen")
          print("=" * 60)

          all_compromised_cidrs = set()
          all_compromised_ips   = set()
          asn_details = {}

          for i, (asn, info) in enumerate(hijacker_asns.items()):
              print(f"[{i+1}/{len(hijacker_asns)}] {asn}...", end=" ", flush=True)

              # Aus Feeds direkt bekannte Prefixes
              for prefix in info["prefixes"]:
                  if "/" in prefix and not is_private(prefix):
                      all_compromised_cidrs.add(prefix)

              # RIPE: alle vom ASN angekündigten Prefixes
              time.sleep(0.4)
              ripe_data, _ = fetch(
                  f"https://stat.ripe.net/data/announced-prefixes/data.json?resource={asn}"
              )

              holder = "Unknown"
              prefix_count = len(info["prefixes"])
              sample_prefixes = list(info["prefixes"])[:5]

              if ripe_data:
                  d = ripe_data.get("data", {})
                  prefixes = d.get("prefixes", [])
                  holder = d.get("resource", asn)

                  # Holder-Name
                  asn_ov, _ = fetch(
                      f"https://stat.ripe.net/data/as-overview/data.json?resource={asn}"
                  )
                  if asn_ov:
                      holder = asn_ov.get("data", {}).get("holder", holder)

                  for pfx_obj in prefixes:
                      prefix = pfx_obj.get("prefix", "")
                      if not prefix or is_private(prefix):
                          continue
                      all_compromised_cidrs.add(prefix)
                      sample_prefixes.append(prefix)
                      try:
                          net = ipaddress.ip_network(prefix, strict=False)
                          if net.prefixlen >= 24:
                              # /24: alle Hosts direkt
                              all_compromised_ips.update(str(h) for h in net.hosts())
                          elif net.prefixlen >= 20:
                              # /20–/23: gesamplet (256 IPs)
                              all_compromised_ips.update(cidr_to_ips_sample(prefix, 256))
                          # Größere Netze nur als CIDR behalten
                      except:
                          pass

                  prefix_count = len(prefixes)
                  print(f"{prefix_count} Prefixes → {holder[:35]}")
              else:
                  print("RIPE nicht erreichbar")

              asn_details[asn] = {
                  "holder": holder,
                  "sources": list(set(info["sources"])),
                  "sample_prefixes": list(set(sample_prefixes))[:10],
                  "prefix_count": prefix_count
              }

          print(f"\n✅ Gesamt CIDRs:  {len(all_compromised_cidrs)}")
          print(f"✅ Gesamt IPs:    {len(all_compromised_ips)}")

          # ══════════════════════════════════════════════════════════════════
          # SCHRITT 3: Bestehende Datei laden & mergen
          # ══════════════════════════════════════════════════════════════════

          print("\n" + "=" * 60)
          print("SCHRITT 3: bgp_compromised_ips.txt aktualisieren")
          print("=" * 60)

          COMPROMISE_FILE = "bgp_compromised_ips.txt"
          existing_entries = set()

          if os.path.exists(COMPROMISE_FILE):
              with open(COMPROMISE_FILE, "r") as f:
                  for line in f:
                      line = line.strip()
                      if line and not line.startswith("#"):
                          existing_entries.add(line)
              print(f"Bestehende Einträge: {len(existing_entries)}")

          # Neue Einträge ermitteln
          new_ips   = all_compromised_ips   - existing_entries
          new_cidrs = all_compromised_cidrs - existing_entries

          # Alles mergen & private rausfiltern
          final_all = (existing_entries | all_compromised_ips | all_compromised_cidrs)
          final_all = {e for e in final_all if not is_private(e)}

          cidrs = sorted(e for e in final_all if "/" in e)
          ips   = sorted(
              (e for e in final_all if "/" not in e),
              key=lambda ip: tuple(int(o) for o in ip.split("."))
          )

          with open(COMPROMISE_FILE, "w") as f:
              f.write(f"# BGP Compromised IPs & Prefixes\n")
              f.write(f"# Automatisch generiert durch BGP Hijack Monitor\n")
              f.write(f"# Aktualisiert: {now_str}\n")
              f.write(f"# Hijacker-ASNs: {len(hijacker_asns)}\n")
              f.write(f"# CIDRs: {len(cidrs)} | Einzel-IPs: {len(ips)}\n")
              f.write(f"# Quellen: cloudflare_radar, bgpstream_caida, ripe_ris\n\n")
              if cidrs:
                  f.write("# ── Hijacked Prefixes (CIDRs) ──\n")
                  f.write("\n".join(cidrs) + "\n\n")
              if ips:
                  f.write("# ── Aufgeloeste Einzel-IPs ──\n")
                  f.write("\n".join(ips) + "\n")

          print(f"✅ Geschrieben: {len(cidrs)} CIDRs + {len(ips)} IPs = {len(cidrs)+len(ips)} Einträge")
          print(f"   Davon NEU:   {len(new_cidrs)} CIDRs + {len(new_ips)} IPs")

          # ══════════════════════════════════════════════════════════════════
          # SCHRITT 4: Report schreiben
          # ══════════════════════════════════════════════════════════════════

          lines = []
          lines.append("# BGP Hijack Monitor – Report")
          lines.append(f"**Aktualisiert:** {now_str}\n")
          lines.append("---")
          lines.append("## Zusammenfassung\n")
          lines.append("| Metrik | Wert |")
          lines.append("|---|---|")
          lines.append(f"| BGP-Feeds | Cloudflare Radar, BGPStream CAIDA, RIPE RIS |")
          lines.append(f"| Erkannte Hijacker-ASNs | **{len(hijacker_asns)}** |")
          lines.append(f"| Hijacked Prefixes (CIDRs) | **{len(cidrs)}** |")
          lines.append(f"| Aufgelöste Einzel-IPs | **{len(ips)}** |")
          lines.append(f"| Neu hinzugekommen | **{len(new_cidrs) + len(new_ips)}** |")
          lines.append(f"| Datei | `bgp_compromised_ips.txt` |")
          lines.append("")
          lines.append("---")
          lines.append("## Erkannte Hijacker-ASNs\n")
          lines.append("| ASN | Organisation | Quellen | Prefix-Anzahl |")
          lines.append("|---|---|---|---|")
          for asn, d in sorted(asn_details.items()):
              src = ", ".join(d["sources"])
              lines.append(f"| **{asn}** | {d['holder'][:45]} | {src} | {d['prefix_count']} |")

          if new_cidrs or new_ips:
              lines.append("")
              lines.append("---")
              lines.append(f"## Neu entdeckt (dieser Run)\n")
              if new_cidrs:
                  lines.append(f"**{len(new_cidrs)} neue CIDRs:**")
                  for c in sorted(list(new_cidrs))[:30]:
                      lines.append(f"- `{c}`")
                  if len(new_cidrs) > 30:
                      lines.append(f"- *... und {len(new_cidrs)-30} weitere*")

          lines.append("")
          lines.append("---")
          lines.append("*`bgp_compromised_ips.txt` wird vom Blacklist-Workflow automatisch eingelesen.*")
          lines.append(f"\n*Generiert: {now_str}*")

          with open("bgp_hijack_report.md", "w", encoding="utf-8") as f:
              f.write("\n".join(lines))

          print("✅ bgp_hijack_report.md geschrieben")
          EOF

      - name: Commit Results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bgp_compromised_ips.txt bgp_hijack_report.md
          git diff --staged --quiet || git commit -m "BGP Monitor: Compromise-Liste aktualisiert [$(date -u '+%Y-%m-%d %H:%M') UTC]"
          git push
