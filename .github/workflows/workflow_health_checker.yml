name: Workflow Health Checker

on:
  schedule:
    - cron: '5 1 * * *'    # täglich 01:05 UTC (5 Min nach feed_health_monitor um 01:00)
  push:
    paths:
      - '.github/workflows/*.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: read
  issues: none
  packages: none
  pull-requests: none
  security-events: none

jobs:
  workflow-health:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: true

      - name: Check all Workflows
        run: |
          python3 << 'EOF'
          import os, re, glob
          from datetime import datetime, timezone

          now     = datetime.now(timezone.utc)
          now_str = now.strftime("%Y-%m-%d %H:%M UTC")

          WORKFLOW_DIR = ".github/workflows"
          yml_files    = sorted(glob.glob(f"{WORKFLOW_DIR}/*.yml"))

          results = []

          for path in yml_files:
              name     = os.path.basename(path)
              warnings = []
              errors   = []

              with open(path, encoding="utf-8") as f:
                  content = f.read()
                  lines   = content.splitlines()

              # ── Pflichtfelder ────────────────────────────────────────────
              if "permissions:" not in content:
                  errors.append("Fehlendes `permissions:` – Workflow könnte keine Schreibrechte haben")
              if "contents: write" not in content:
                  errors.append("Fehlendes `contents: write` – Push wird fehlschlagen")
              if "persist-credentials: true" not in content:
                  warnings.append("Kein `persist-credentials: true` – Push-Auth könnte fehlen")

              # ── Cron-Format prüfen ───────────────────────────────────────
              # Nur echte YAML-Schedule-Zeilen (- cron: '...'), keine Python-Strings
              cron_matches = []
              for line in lines:
                  m = re.match(r"\s*-\s+cron:\s*['\"]([^'\"]+)['\"]", line)
                  if m:
                      cron_matches.append(m.group(1))
              for cron_expr in cron_matches:
                  parts = cron_expr.strip().split()
                  if len(parts) != 5:
                      errors.append(f"Ungültiger Cron-Ausdruck: `{cron_expr}` (erwartet 5 Felder)")

              # ── Timeout prüfen ───────────────────────────────────────────
              if "timeout-minutes:" not in content:
                  warnings.append("Kein `timeout-minutes:` – Job könnte bis zu 6h hängen")

              # ── git push ohne rebase ─────────────────────────────────────
              for i, line in enumerate(lines, 1):
                  stripped = line.strip()
                  if stripped == "git push" or stripped == "git push\n":
                      errors.append(f"Zeile {i}: Nacktes `git push` ohne rebase – Konflikt-Risiko bei parallelen Runs")

              # ── YAML-Struktur: run: direkt nach uses: ───────────────────
              for i, line in enumerate(lines):
                  if "uses: actions/cache" in line or "uses: actions/checkout" in line:
                      # nächste nicht-leere Zeile prüfen
                      for j in range(i+1, min(i+10, len(lines))):
                          nl = lines[j].strip()
                          if nl == "":
                              continue
                          if nl.startswith("run:"):
                              errors.append(f"Zeile {j+1}: `run:` direkt nach `uses:` ohne eigenen `- name:` Step → YAML-Fehler")
                          break

              # ── Commit-Message-Format ────────────────────────────────────
              for i, line in enumerate(lines, 1):
                  stripped = line.strip()
                  # Nur echte Shell-Zeilen prüfen (nicht Python-Code mit re.findall etc.)
                  if stripped.startswith("git commit -m") and "findall" not in stripped and "re." not in stripped:
                      m = re.search(r'git commit -m ["\']([^"\']+)["\']', stripped)
                      if m:
                          msg = m.group(1)
                          if "UTC" not in msg and "date" not in msg:
                              warnings.append(f"Zeile {i}: Commit-Message ohne UTC-Zeitstempel: `{msg[:60]}`")

              # ── git add vor commit ───────────────────────────────────────
              if "git commit" in content and "git add" not in content:
                  warnings.append("git commit ohne vorheriges git add gefunden")

              # ── git add ohne Argumente ───────────────────────────────────
              for i, line in enumerate(lines, 1):
                  stripped = line.strip()
                  if stripped == "git add" or stripped == "git add ":
                      errors.append(f"Zeile {i}: `git add` ohne Argumente – keine Datei wird gestaged, Commit ist leer")

              # ── python3 -c mit mehrzeiligem Code (YAML-Syntaxfehler) ────
              for i, line in enumerate(lines, 1):
                  stripped = line.strip()
                  if stripped.startswith("python3 -c") and (stripped.endswith('"') is False or stripped.count('"') < 2):
                      if stripped.endswith('"') is False:
                          errors.append(f"Zeile {i}: `python3 -c \"...` mit mehrzeiligem Code – YAML-Syntaxfehler, bitte `python3 << 'EOF'` verwenden")

              # ── Heredoc (EOF/PYEOF) ohne korrekte Einrückung ─────────────
              in_heredoc = False
              heredoc_indent = 0
              for i, line in enumerate(lines, 1):
                  stripped = line.strip()
                  if re.search(r"<<\s*'[A-Z]+EOF[A-Z]*'", line) or re.search(r'<<\s*"[A-Z]+EOF[A-Z]*"', line):
                      in_heredoc = True
                      heredoc_indent = len(line) - len(line.lstrip())
                      continue
                  if in_heredoc:
                      if re.match(r'^[A-Z]*EOF[A-Z]*\s*$', stripped):
                          in_heredoc = False
                          continue
                      if line.strip() and not line.startswith(" " * max(heredoc_indent, 1)):
                          errors.append(f"Zeile {i}: Heredoc-Inhalt ohne Einrückung – YAML-Syntaxfehler (mindestens {heredoc_indent} Leerzeichen erwartet)")
                          in_heredoc = False

              # ── Hilfsfunktion: Echter Code oder Fehlertext-String? ──────
              def is_code_line(ln):
                  """True wenn Zeile echter Code ist – kein Kommentar, kein append-Meldungstext."""
                  s = ln.strip()
                  if s.startswith('#'):
                      return False
                  import re as _re
                  if _re.search(r'(errors|warnings)\.append\s*\(', ln):
                      return False
                  return True

              # ── str(dict).get() – AttributeError ────────────────────────
              for i, line in enumerate(lines, 1):
                  if not is_code_line(line):
                      continue
                  if re.search(r'str\s*\(.*\)\s*\.get\s*\(', line):
                      errors.append(f"Zeile {i}: `str(...).get(...)` – str hat kein .get(), führt zu AttributeError. Korrekt: `(dict_expr).get(...)`")

              # ── seen_db wird modifiziert aber Cache nicht gespeichert ────
              modifies_seen_db = any(
                  re.search(r'(del db\[|db\.pop\(|json\.dump\(db)', line)
                  for line in lines
              )
              has_cache_save = "actions/cache" in content and (
                  "github.run_id" in content or "save" in content.lower()
              )
              # Nur warnen wenn seen_db modifiziert wird aber kein Cache-Save-Step vorhanden
              if modifies_seen_db and "github.run_id" not in content:
                  errors.append("seen_db.json wird modifiziert, aber kein `Save seen_db Cache`-Step mit `github.run_id` gefunden – Änderungen gehen beim nächsten Run verloren")

              # ── Cache Restore-Key Konsistenz ─────────────────────────────
              # Combined speichert mit netshield-seen-db-v1-<run_id> und netshield-seen-db-v1-latest
              # Workflows die seen_db lesen müssen restore-keys: netshield-seen-db-v1- verwenden
              uses_seen_db_cache = "netshield-seen-db" in content and "actions/cache" in content
              if uses_seen_db_cache:
                  has_old_only = bool(re.search(r"key:\s*netshield-seen-db-v1\s*$", content, re.MULTILINE))
                  has_new_restore = "netshield-seen-db-v1-" in content and "restore-keys" in content
                  if has_old_only and not has_new_restore:
                      errors.append(
                          "Cache Restore-Key `netshield-seen-db-v1` findet den von Combined gespeicherten "
                          "Cache (`netshield-seen-db-v1-<run_id>`) nicht. Korrekt: "
                          "`key: netshield-seen-db-v1-latest` + `restore-keys: |\n  netshield-seen-db-v1-`"
                      )

              # ── days_seen Initialwert bei .get() ─────────────────────────
              # get("days_seen", 1) + 1 startet fälschlich bei 2 statt 1
              # korrekt: get("days_seen", 0) + 1
              for i, line in enumerate(lines, 1):
                  if not is_code_line(line):
                      continue
                  if re.search(r'get\s*\(\s*["\'\']days_seen["\'\']\s*,\s*1\s*\)\s*\+\s*1', line):
                      errors.append(
                          f"Zeile {i}: `get(\"days_seen\", 1) + 1` – Initialwert falsch: "
                          f"erster Bestätigungstag wird als 2 gezählt. Korrekt: `get(\"days_seen\", 0) + 1`"
                      )

              # ── seen_db Schema-Vollständigkeit ───────────────────────────
              # Neue Einträge müssen alle Pflichtfelder des neuen Schemas enthalten
              REQUIRED_SCHEMA_FIELDS = ["days_seen", "today_count", "today_hq", "hq_feeds", "feeds"]
              writes_new_db_entry = bool(re.search(r'"first"\s*:\s*now_day', content))
              if writes_new_db_entry:
                  missing = [f for f in REQUIRED_SCHEMA_FIELDS if f'"{f}"' not in content]
                  if missing:
                      errors.append(
                          f"seen_db Eintrag fehlt Pflichtfelder: {missing} – "
                          f"Confidence-Scoring ignoriert diese IPs (Score bleibt 0)"
                      )


              # ── [AUDIT-BUG-1] O(n²) API-Loop: fetch innerhalb ASN-Score-Schleife ────
              # Erkennt: for asn ... in asn_ip_count.items(): ... fetch_json(...iptoasn...)
              in_asn_loop = False
              for i, line in enumerate(lines, 1):
                  if not is_code_line(line):
                      continue
                  if re.search(r'for\s+\w+.*in\s+asn_ip_count', line):
                      in_asn_loop = True
                  if in_asn_loop and re.search(r'fetch_json\s*\(.*iptoasn', line):
                      errors.append(
                          f"Zeile {i}: [AUDIT-BUG-1] API-Call zu iptoasn.com innerhalb des ASN-Score-Loops "
                          f"→ O(n²) Komplexität, bis zu 15.000+ Requests, Timeout und Rate-Limit-Sperre. "
                          f"Fix: asn_to_ips-Dict bereits in Schritt 2 befüllen, im Score-Loop nur "
                          f"`asn_to_ips.get(asn, [])` verwenden."
                      )
                      in_asn_loop = False  # einmal pro Loop melden

              # ── [AUDIT-BUG-2] seen_db wird modifiziert aber nicht committed ────────
              # Erkennt Workflows die json.dump(db) aufrufen aber nicht im git add haben
              writes_seen_db = bool(re.search(r'json\.dump\s*\(\s*db\s*,', content))
              has_seen_db_in_git_add = bool(re.search(r'git\s+add\b.*seen_db\.json', content))
              if writes_seen_db and not has_seen_db_in_git_add:
                  errors.append(
                      "[AUDIT-BUG-2] wird per json.dump() geschrieben, "
                      "aber fehlt im `git add`-Befehl. Fällt der GitHub-Cache nach 7 Tagen weg, "
                      "gehen alle Änderungen (z.B. Community-Reports) dauerhaft verloren. "
                      "Fix: `git add ...` ergänzen."
                  )

              # ── [AUDIT-BUG-3] Score-Decay überschreibt latest-Cache-Alias ───────────
              # Erkennt: Workflow enthält 'decay' im Namen oder 'DECAY_DAYS' im Code
              # und speichert Cache mit key: netshield-seen-db-v1-latest (statt decay-<run_id>)
              is_decay_workflow = "DECAY_DAYS" in content or "score_decay" in name.lower() or "decay" in name.lower()
              if is_decay_workflow:
                  saves_latest_alias = bool(re.search(
                      r'key:\s*netshield-seen-db-v1-\$\{\{?\s*github\.run_id\s*\}?\}', content
                  ))
                  overwrites_latest = bool(re.search(
                      r'key:\s*netshield-seen-db-v1-latest', content
                  ))
                  # Prüfen ob ein Save-Step den latest-Key schreibt (nicht nur Restore)
                  # Heuristik: wenn latest als einziger Save-Key vorkommt
                  save_blocks = re.findall(r'- name: Save seen_db.*?(?=- name:|\Z)', content, re.DOTALL)
                  for block in save_blocks:
                      if "netshield-seen-db-v1-latest" in block and "decay" not in block:
                          errors.append(
                              "[AUDIT-BUG-3] Score-Decay-Workflow speichert Cache mit Key "
                              "`netshield-seen-db-v1-latest` – überschreibt damit den aktuellen "
                              "Combined-Cache mit einer modifizierten (ausgedünnten) seen_db. "
                              "Der nächste Combined-Lauf startet mit falscher DB. "
                              "Fix: Save-Key auf `netshield-seen-db-v1-decay-\${{ github.run_id }}` ändern."
                          )

              # ── [AUDIT-TIMING] Bekannte Zeitkonflikte prüfen ────────────────────────
              # Prüft ob noch die alten konfliktbehafteten Cron-Zeiten vorhanden sind
              KNOWN_CONFLICTS = {
                  "workflow_health_checker.yml": {
                      "bad":  r"^0\s+1\s+\*\s+\*\s+\*$",
                      "hint": "01:00 UTC – Konflikt mit feed_health_monitor. Fix: `5 1 * * *` (01:05 UTC)"
                  },
                  "update-blocklist.yml": {
                      "bad":  r"^0\s+3\s+\*\s+\*\s+[13]$",
                      "hint": "03:00 UTC Mo/Mi – Konflikt mit update_combined_blacklist. Fix: `30 2 * * 1` / `30 2 * * 3` (02:30 UTC)"
                  },
                  "false_positive_checker.yml": {
                      "bad":  r"^0\s+(?:6|14|22)\s+\*\s+\*\s+\*$",
                      "hint": "06:00/14:00/22:00 UTC – Konflikt mit update_combined_blacklist (gleiche Zeit). Fix: 05:30/13:30/21:30 UTC"
                  },
                  "auto_feed_discovery.yml": {
                      "bad":  r"^0\s+4\s+\*\s+\*\s+0$",
                      "hint": "04:00 UTC Sonntag – Konflikt mit cve_to_ip_mapper. Fix: `30 4 * * 0` (04:30 UTC)"
                  },
                  "geo_tagger.yml": {
                      "bad":  r"^0\s+6\s+\*\s+\*\s+0$",
                      "hint": "06:00 UTC Sonntag – Überschneidung mit false_positive_checker + combined. Fix: `30 6 * * 0` (06:30 UTC)"
                  },
              }
              if name in KNOWN_CONFLICTS:
                  conflict = KNOWN_CONFLICTS[name]
                  for cron_expr in cron_matches:
                      if re.search(conflict["bad"], cron_expr):
                          errors.append(
                              f"[AUDIT-TIMING] Zeitkonflikt erkannt: `{cron_expr}` – {conflict['hint']}"
                          )

              # ── Doppelte Cron-Kommentare ─────────────────────────────────
              for i, line in enumerate(lines, 1):
                  if "cron:" in line and line.count("#") >= 2:
                      warnings.append(f"Zeile {i}: Doppelter Kommentar im Cron-Eintrag – bitte bereinigen")

              # ── IP-Sort ohne numerischen Key (lexikografisch falsch) ─────
              for i, line in enumerate(lines, 1):
                  if not is_code_line(line):
                      continue
                  stripped = line.strip()
                  if re.search(r'\bsorted\s*\(\s*(all_ips|ips|blacklist_ips|final_ips|active_ips)\s*\)', stripped):
                      warnings.append(f"Zeile {i}: `sorted(ips)` ohne `key=` – lexikografische Sortierung, nicht numerisch (z.B. '10.x' < '2.x'). Korrekt: `sorted(ips, key=lambda ip: tuple(int(o) for o in ip.split('.')))`")
                  if re.search(r'active\w*\.sort\(\)\s*$', stripped) or re.search(r'active_ips\.sort\(\)\s*$', stripped):
                      warnings.append(f"Zeile {i}: `.sort()` ohne `key=` auf IP-Liste – lexikografisch statt numerisch")

              # ── HTTP-Calls in List-Comprehension ohne Rate-Limiting ──────
              for i, line in enumerate(lines, 1):
                  if re.search(r'for\s+\w+\s+in\s+\w+.*if.*fetch', line) or \
                     re.search(r'\[.*fetch.*for\s+\w+\s+in', line):
                      warnings.append(f"Zeile {i}: HTTP-Call in List-Comprehension – kein Rate-Limiting möglich, kann zu API-Sperren führen. Besser: explizite Schleife mit `time.sleep()`")

              # ── open() ohne encoding auf Textdateien ─────────────────────
              for i, line in enumerate(lines, 1):
                  if re.search(r'open\s*\([^)]*["\'](?:w|a)["\']', line):
                      if 'encoding' not in line and re.search(r'\.(md|txt|csv)\b', line):
                          warnings.append(f"Zeile {i}: `open()` ohne `encoding=\"utf-8\"` für Textdatei – kann auf manchen Systemen zu Fehlern führen")

              # ── Kein concurrency-Block ────────────────────────────────────
              if "concurrency:" not in content:
                  warnings.append("Kein `concurrency:`-Block – gleichzeitige schedule+manuell Runs können sich gegenseitig überschreiben")

              # ── exit() vs sys.exit() gemischt ────────────────────────────
              has_bare_exit = bool(re.search(r'(?<!sys\.)\bexit\s*\(\s*[01]\s*\)', content))
              has_sys_exit  = bool(re.search(r'\bsys\.exit\s*\(', content))
              if has_bare_exit and has_sys_exit:
                  warnings.append("`exit()` und `sys.exit()` gemischt verwendet – einheitlich `sys.exit()` bevorzugen")

              # ── Irreführende Kommentare (Kommentar ≠ Code) ───────────────
              for i, line in enumerate(lines, 1):
                  if "Top-500" in line or "top-500" in line:
                      context = "\n".join(lines[max(0, i-5):i+5])
                      if "[:500]" not in context:
                          warnings.append(f"Zeile {i}: Kommentar erwähnt 'Top-500' aber kein `[:500]`-Slice im Code – irreführend, prüfen ob wirklich alle IPs gemeint sind")

              status = "❌ FEHLER" if errors else ("⚠️ WARNUNG" if warnings else "✅ OK")
              results.append({
                  "file":     name,
                  "status":   status,
                  "errors":   errors,
                  "warnings": warnings,
                  "crons":    cron_matches,
              })
              print(f"{status}: {name} ({len(errors)} Fehler, {len(warnings)} Warnungen)")

          # ── Report ────────────────────────────────────────────────────────
          ok_count   = sum(1 for r in results if r["status"] == "✅ OK")
          warn_count = sum(1 for r in results if r["status"] == "⚠️ WARNUNG")
          err_count  = sum(1 for r in results if r["status"] == "❌ FEHLER")

          lines = []
          lines.append("# Workflow Health Checker – Report")
          lines.append(f"**Aktualisiert:** {now_str}\n")
          lines.append(f"**Workflows:** {len(results)} | ✅ {ok_count} OK | ⚠️ {warn_count} Warnung | ❌ {err_count} Fehler\n")
          lines.append("---")
          lines.append("## Übersicht\n")
          lines.append("| Workflow | Status | Fehler | Warnungen | Cron |")
          lines.append("|---|---|---|---|---|")
          for r in results:
              cron_str = ", ".join(f"`{c}`" for c in r["crons"]) if r["crons"] else "–"
              lines.append(f"| `{r['file']}` | {r['status']} | {len(r['errors'])} | {len(r['warnings'])} | {cron_str} |")

          if err_count > 0:
              lines.append("\n---\n## ❌ Fehler im Detail\n")
              for r in results:
                  if r["errors"]:
                      lines.append(f"### `{r['file']}`\n")
                      for e in r["errors"]:
                          lines.append(f"- 🔴 {e}")
                      lines.append("")

          if warn_count > 0:
              lines.append("\n---\n## ⚠️ Warnungen im Detail\n")
              for r in results:
                  if r["warnings"]:
                      lines.append(f"### `{r['file']}`\n")
                      for w in r["warnings"]:
                          lines.append(f"- 🟡 {w}")
                      lines.append("")

          lines.append(f"\n---\n*Generiert: {now_str} | {len(yml_files)} Workflow-Dateien geprüft*")

          with open("workflow_health_report.md", "w", encoding="utf-8") as f:
              f.write("\n".join(lines))
          print(f"\nworkflow_health_report.md geschrieben")
          print(f"Gesamt: {ok_count} OK | {warn_count} Warnungen | {err_count} Fehler")
          EOF

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add workflow_health_report.md
          if git diff --staged --quiet; then
            echo "Keine Änderungen"
          else
            git commit -m "Workflow Health Checker: $(date -u '+%Y-%m-%d %H:%M') UTC"
            git pull --rebase origin ${GITHUB_REF_NAME}
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
