name: Workflow Health Checker

on:
  schedule:
    - cron: '5 1 * * *'    # täglich 01:05 UTC (5 Min nach feed_health_monitor um 01:00)
  push:
    paths:
      - '.github/workflows/*.yml'
      - '.github/scripts/workflow_health_checker.py'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: read
  issues: none
  packages: none
  pull-requests: none
  security-events: none

jobs:
  workflow-health:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: true

      - name: Check all Workflows
        run: python3 .github/scripts/workflow_health_checker.py

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add workflow_health_report.md
          if git diff --staged --quiet; then
            echo "Keine Änderungen"
          else
            git commit -m "Workflow Health Checker: $(date -u '+%Y-%m-%d %H:%M') UTC"
            git pull --rebase origin ${GITHUB_REF_NAME}
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
