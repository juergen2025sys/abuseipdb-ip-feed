name: Update Combined Blacklist

on:
  schedule:
    - cron: '0 0 * * *'    # täglich 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Restore seen_db Cache
        uses: actions/cache@v4
        with:
          path: seen_db.json
          key: netshield-seen-db-v1
          restore-keys: |
            netshield-seen-db-

