              "dc_123jjck_cdn":             ("https://raw.githubusercontent.com/123jjck/cdn-ip-ranges/refs/heads/main/all/all_plain_ipv4.txt", False),

              # ── GeoIP (optional, für Geo-Tagger) ─────────────────────────
              "geo_europe":                 ("https://raw.githubusercontent.com/antonme/GeoIP/refs/heads/master/europe.ipv4.cidr.txt", False),
              "geo_us":                     ("https://raw.githubusercontent.com/antonme/GeoIP/refs/heads/master/us.ipv4.cidr.txt", False),
              "geo_cis":                    ("https://raw.githubusercontent.com/antonme/GeoIP/refs/heads/master/cis.ipv4.cidr.txt", False),
              "geo_cn":                     ("https://raw.githubusercontent.com/antonme/GeoIP/refs/heads/master/cn.ipv4.cidr.txt", False),
              "geo_russia":                 ("https://raw.githubusercontent.com/antonme/GeoIP/refs/heads/master/russia.ipv4.cidr.txt", False),
          }

          # HQ-Set für schnellen Lookup
          HIGH_QUALITY = {name for name, (_, hq) in SOURCES.items() if hq}

          DNS_WHITELIST = {
              "8.8.8.8","8.8.4.4","1.1.1.1","1.0.0.1",
              "208.67.222.222","208.67.220.220","9.9.9.9",
              "149.112.112.112","94.140.14.14","94.140.15.15",
          }

          IPV4_RE = re.compile(r"\b((?:\d{1,3}\.){3}\d{1,3})\b")

          # ── seen_db laden ──────────────────────────────────────────────────
          db = {}
          if os.path.exists(DB_FILE):
              try:
                  with open(DB_FILE) as f:
                      db = json.load(f)
                  print(f"seen_db geladen: {len(db)} IPs")
              except Exception:
                  db = {}
          else:
              print("Keine seen_db gefunden – starte neu.")

          def is_valid_public_ipv4(ip):
              try:
                  obj = ipaddress.ip_address(ip)
                  return (obj.version == 4 and not obj.is_private and
                          not obj.is_loopback and not obj.is_multicast and
                          not obj.is_unspecified and not obj.is_reserved and
                          not obj.is_link_local)
              except Exception:
                  return False

          def fetch_ips(name, url):
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "NETSHIELD/3.0"})
                  opener = urllib.request.build_opener(urllib.request.HTTPRedirectHandler())
                  with opener.open(req, timeout=25) as r:
                      content = r.read(READ_LIMIT).decode("utf-8", errors="ignore")
                  found = set()
                  for line in content.splitlines():
                      line = line.strip()
                      if not line or line.startswith("#") or line.startswith(";"):
                          continue
                      for m in IPV4_RE.finditer(line):
                          ip = m.group(1)
                          if ip not in DNS_WHITELIST and is_valid_public_ipv4(ip):
                              found.add(ip)
                  print(f"OK  {name}: {len(found)} IPs")
                  return name, found
              except Exception as e:
                  print(f"ERR {name}: {e}")
                  return name, set()

          # ── Alle Feeds parallel laden ──────────────────────────────────────
          ip_feed_count = {}
          ip_in_hq      = set()
          feed_stats    = []

          with ThreadPoolExecutor(max_workers=15) as executor:
              futures = {executor.submit(fetch_ips, n, u): n for n, (u, _) in SOURCES.items()}
              for future in as_completed(futures, timeout=600):
                  name, ips = future.result()
                  for ip in ips:
                      ip_feed_count[ip] = ip_feed_count.get(ip, 0) + 1
                      if name in HIGH_QUALITY:
                          ip_in_hq.add(ip)
                  feed_stats.append((name, len(ips)))

          # ── Lokale Sub-Workflow-Dateien einlesen ───────────────────────────
          LOCAL_FEEDS = {
              "tor_exit_nodes.txt":              True,
              "cve_exploit_ips.txt":             True,
              "vpn_proxy_ranges.txt":            False,
              "bot_detector_blacklist_ipv4.txt": False,
              "honeypot_ips.txt":                True,
          }
          for local_file, is_hq_local in LOCAL_FEEDS.items():
              if not os.path.exists(local_file):
                  print(f"  SKIP (nicht vorhanden): {local_file}")
                  continue
              local_ips = set()
              with open(local_file) as lf:
                  for line in lf:
                      line = line.strip()
                      if not line or line.startswith("#"):
                          continue
                      for m in IPV4_RE.finditer(line):
                          ip = m.group(1)
                          if ip not in DNS_WHITELIST and is_valid_public_ipv4(ip):
                              local_ips.add(ip)
              for ip in local_ips:
                  ip_feed_count[ip] = ip_feed_count.get(ip, 0) + 1
                  if is_hq_local:
                      ip_in_hq.add(ip)
              feed_stats.append((local_file, len(local_ips)))
              print(f"  Lokal: {local_file} → {len(local_ips)} IPs (HQ={is_hq_local})")

          # ── Nur valide IPs in seen_db aufnehmen (2+ Feeds ODER HQ) ────────
          current_valid = {ip for ip, count in ip_feed_count.items()
                           if count >= 2 or ip in ip_in_hq}
          for ip in current_valid:
              if ip in db:
                  db[ip]["last"] = now_day
                  if ip in ip_in_hq:
                      db[ip]["hq"] = True
              else:
                  db[ip] = {"first": now_day, "last": now_day, "hq": ip in ip_in_hq}

          # ── 365-Tage-Ablauf ────────────────────────────────────────────────
          expired = []
          cutoff  = now - timedelta(days=EXPIRY_DAYS)
          for ip in list(db.keys()):
              try:
                  last_seen = datetime.strptime(db[ip]["last"], "%Y-%m-%d").replace(tzinfo=timezone.utc)
                  if last_seen < cutoff:
                      expired.append(ip)
                      del db[ip]
              except Exception:
                  expired.append(ip)
                  del db[ip]
          print(f"Abgelaufen (>{EXPIRY_DAYS} Tage): {len(expired)} IPs entfernt")

          # ── seen_db speichern ──────────────────────────────────────────────
          with open(DB_FILE, "w") as f:
              json.dump(db, f, separators=(",", ":"))

          # ── Stufe 1: combined_threat_blacklist_ipv4.txt (alle DB-IPs) ─────
          sorted_ips = sorted(db.keys())
          feed_stats.sort(key=lambda x: -x[1])

          with open("combined_threat_blacklist_ipv4.txt", "w", encoding="utf-8") as f:
              f.write("# NETSHIELD Combined Threat Blacklist (IPv4) – Stufe 1\n")
              f.write(f"# Aktualisiert: {now_stamp}\n")
              f.write(f"# Feeds: {len(SOURCES)}\n")
              f.write(f"# Eintraege: {len(sorted_ips)}\n")
              f.write(f"# Abgelaufen entfernt: {len(expired)}\n\n")
              f.write("\n".join(sorted_ips) + "\n")

          # ── Stufe 2: active_blacklist_ipv4.txt (30 Tage, 2+ Feeds oder HQ) ─
          cutoff_30 = now - timedelta(days=30)
          active_ips = []
          for ip, data in db.items():
              try:
                  last_dt = datetime.strptime(data["last"], "%Y-%m-%d").replace(tzinfo=timezone.utc)
                  if last_dt >= cutoff_30 and (data.get("hq") or ip_feed_count.get(ip, 0) >= 2):
                      active_ips.append(ip)
              except Exception:
                  pass
          active_ips.sort()

          with open("active_blacklist_ipv4.txt", "w", encoding="utf-8") as f:
              f.write("# NETSHIELD Active Blacklist (IPv4) – Stufe 2\n")
              f.write(f"# Aktualisiert: {now_stamp}\n")
              f.write(f"# Kriterien: last_seen <= 30 Tage + 2+ Feeds oder HQ=True\n")
              f.write(f"# Eintraege: {len(active_ips)}\n\n")
              f.write("\n".join(active_ips) + "\n")

          # ── Report ─────────────────────────────────────────────────────────
          with open("combined_threat_blacklist_report.md", "w", encoding="utf-8") as f:
              f.write("# Combined Threat Blacklist Report\n\n")
              f.write(f"- Aktualisiert: **{now_stamp}**\n")
              f.write(f"- Feeds gesamt: **{len(SOURCES)}**\n")
              f.write(f"- Stufe 1 (combined): **{len(sorted_ips)}** IPs\n")
              f.write(f"- Stufe 2 (active, 30 Tage): **{len(active_ips)}** IPs\n")
              f.write(f"- Abgelaufen & entfernt: **{len(expired)}**\n\n")
              f.write("## Feed-Statistik\n\n| Feed | IPs |\n|---|---:|\n")
              for name, count in feed_stats:
                  hq_mark = " ⭐" if name in HIGH_QUALITY else ""
                  f.write(f"| `{name}`{hq_mark} | {count} |\n")

          print(f"\nFertig! combined: {len(sorted_ips)} IPs | active: {len(active_ips)} IPs | Feeds: {len(SOURCES)}")
          EOF

      - name: Save seen_db Cache
        uses: actions/cache@v4
        with:
          path: seen_db.json
          key: netshield-seen-db-v1-${{ github.run_id }}

      - name: Commit and Push
        run: |
          python3 - << 'PYEOF'
          import json, os
          from datetime import datetime, timezone
          now_str = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")
          meta = {"note": "seen_db.json nur im GitHub Actions Cache (zu gross fuer Repo)", "updated": now_str}
          if os.path.exists("seen_db.json"):
              with open("seen_db.json") as f:
                  db = json.load(f)
              meta["total_ips"] = len(db)
              meta["size_mb"] = round(os.path.getsize("seen_db.json") / 1024 / 1024, 1)
              print(f"seen_db: {len(db)} IPs, {meta['size_mb']} MB")
          with open("seen_db_meta.json", "w") as f:
              json.dump(meta, f, indent=2)
          PYEOF
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add combined_threat_blacklist_ipv4.txt active_blacklist_ipv4.txt combined_threat_blacklist_report.md seen_db_meta.json
          if git diff --staged --quiet; then
            echo "Keine Änderungen"
          else
            git commit -m "Update Combined Blacklist: $(date -u '+%Y-%m-%d %H:%M') UTC"
            git pull --rebase origin ${GITHUB_REF_NAME}
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
