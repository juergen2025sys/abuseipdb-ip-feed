          def is_gaming_launcher(ip):
              return any(ip.startswith(p) for p in GAMING_LAUNCHER_PREFIXES)
          # ─────────────────────────────────────────────────────────────────

          EXPIRY_DAYS = 60
          DB_FILE = "threat_db.json"

          now = datetime.now(timezone.utc)
          now_str = now.strftime("%Y-%m-%d")

          # Datenbank laden (aus Cache falls vorhanden)
          db = {}
          if os.path.exists(DB_FILE):
              with open(DB_FILE, "r") as f:
                  db = json.load(f)
              print(f"Datenbank geladen: {len(db)} IPs")
          else:
              print("Keine Datenbank gefunden, starte neu.")

          # IPs aus allen Quellen sammeln
          current_ips = set()
          for url in SOURCES:
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                  with urllib.request.urlopen(req, timeout=15) as r:
                      content = r.read().decode("utf-8", errors="ignore")
                  found = set(IP_PATTERN.findall(content))
                  current_ips.update(found)
                  print(f"OK: {url.split('/')[-1]} → {len(found)} IPs")
              except Exception as e:
                  print(f"FEHLER: {url.split('/')[-1]} → {e}")

          # DNS-Whitelist herausfiltern
          current_ips -= DNS_WHITELIST
          # Private/reservierte IP-Ranges ausschließen
          def is_private(ip):
              parts = list(map(int, ip.split('.')))
              return (
                  parts[0] == 10 or
                  (parts[0] == 172 and 16 <= parts[1] <= 31) or
                  (parts[0] == 192 and parts[1] == 168) or
                  parts[0] == 127 or
                  parts[0] == 0 or
                  parts[0] >= 224
              )
          current_ips = {ip for ip in current_ips if not is_private(ip)}

          # Gaming-Launcher IPs herausfiltern
          gaming_removed = {ip for ip in current_ips if is_gaming_launcher(ip)}
          current_ips -= gaming_removed
          print(f"Gaming-Launcher entfernt: {len(gaming_removed)} IPs")

          # Datenbank aktualisieren
          for ip in current_ips:
              if ip in db:
                  db[ip]["score"] = min(db[ip]["score"] + 1, len(SOURCES))
                  db[ip]["last_seen"] = now_str
              else:
                  db[ip] = {
                      "score": 1,
                      "first_seen": now_str,
                      "last_seen": now_str
                  }

          # Abgelaufene IPs entfernen
          expired = []
          for ip in list(db.keys()):
              last = datetime.strptime(db[ip]["last_seen"], "%Y-%m-%d").replace(tzinfo=timezone.utc)
              if (now - last).days > EXPIRY_DAYS:
                  expired.append(ip)
                  del db[ip]
          print(f"Abgelaufen & entfernt: {len(expired)} IPs")

          # Datenbank kompakt speichern (fuer Cache, nicht fuer Repo)
          with open(DB_FILE, "w") as f:
              json.dump(db, f, separators=(',', ':'))
          db_size = os.path.getsize(DB_FILE) / (1024*1024)
          print(f"threat_db.json Groesse: {db_size:.1f} MB (wird gecacht, nicht ins Repo)")

          # Blacklist ausgeben (sortiert nach Score absteigend)
          sorted_ips = sorted(db.keys(), key=lambda ip: db[ip]["score"], reverse=True)

          with open("combined_threat_blacklist_ipv4.txt", "w") as f:
              f.write(f"# Combined Threat Blacklist\n")
              f.write(f"# Aktualisiert: {now.strftime('%Y-%m-%d %H:%M UTC')}\n")
              f.write(f"# Quellen: {len(SOURCES)}\n")
              f.write(f"# Gesamt IPs: {len(sorted_ips)}\n")
              f.write(f"# Abgelaufen & entfernt: {len(expired)}\n")
              f.write("\n".join(sorted_ips) + "\n")

          print(f"\nFertig! Gesamt: {len(sorted_ips)} IPs | Abgelaufen: {len(expired)}")
          EOF

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          grep -qxF 'threat_db.json' .gitignore 2>/dev/null || echo 'threat_db.json' >> .gitignore
          git add combined_threat_blacklist_ipv4.txt .gitignore
          git diff --staged --quiet || git commit -m "Auto-update combined_threat_blacklist_ipv4.txt [$(date -u '+%Y-%m-%d %H:%M') UTC]"
          git push
