name: Update Combined Threat Blacklist (IPv4)

on:
  schedule:
    - cron: '0 */6 * * *'   # alle 6 Stunden
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Fetch and build blacklist
        run: |
          python3 << 'EOF'
          import ipaddress
          import re
          import urllib.request
          from datetime import datetime, timezone
          from concurrent.futures import ThreadPoolExecutor, as_completed

          now_stamp = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")

          SOURCES = {
              "cinsscore":            "https://cinsscore.com/list/ci-badguys.txt",
              "greensnow":            "https://blocklist.greensnow.co/greensnow.txt",
              "feodo_aggressive":     "https://feodotracker.abuse.ch/downloads/ipblocklist_aggressive.txt",
              "threatfox_ioc":        "https://raw.githubusercontent.com/elliotwutingfeng/ThreatFox-IOC-IPs/refs/heads/main/ips.txt",
              "l7_ddos":              "https://raw.githubusercontent.com/Tizian-Maxime-Weigt/L7-HTTP-DDoS-Flood-IP-Signature-IP-List/refs/heads/main/ddos-signatures.txt",
              "binary_defense":       "https://binarydefense.com/banlist.txt",
              "data_shield":          "https://raw.githubusercontent.com/duggytuxy/Data-Shield_IPv4_Blocklist/refs/heads/main/prod_data-shield_ipv4_blocklist.txt",
              "interserver":          "https://sigs.interserver.net/ip.txt",
              "crowdsec_ssh":         "https://raw.githubusercontent.com/Y3ll0w/CrowdSec-CAPI-Decisions/refs/heads/main/ssh-bf.json.txt",
              "trcert_malware":       "https://raw.githubusercontent.com/cenk/trcert-malware/refs/heads/main/trcert-ips.txt",
              "danger_bruteforce":    "https://danger.rulez.sk/projects/bruteforceblocker/blist.php",
              "threatview_high_conf": "https://threatview.io/Downloads/IP-High-Confidence-Feed.txt",
              "florent_banned":       "https://raw.githubusercontent.com/florentvinai/bad-ips-on-my-vps/refs/heads/main/banned_ips.txt",
              "firehol_cybercrime":   "https://raw.githubusercontent.com/firehol/blocklist-ipsets/refs/heads/master/cybercrime.ipset",
              "firehol_anonymous":    "https://raw.githubusercontent.com/firehol/blocklist-ipsets/master/firehol_anonymous.netset",
              "dshield":              "https://www.dshield.org/block.txt",
              "cloudzy":              "https://raw.githubusercontent.com/CriticalPathSecurity/Public-Intelligence-Feeds/refs/heads/master/cloudzy.txt",
              "bbcan177":             "https://gist.githubusercontent.com/BBcan177/d7105c242f17f4498f81/raw",
              "kevinmarx":            "https://kevinmarx.org/malicious-ip-list.txt",
              "honeypot_blocklist":   "https://raw.githubusercontent.com/yuexuan521/honeypot-blocklist/refs/heads/main/ip_list.txt",
              "edanwong":             "https://raw.githubusercontent.com/EdanWong/ip_list/refs/heads/main/my_ips.txt",
              "nixbear_malicious":    "https://raw.githubusercontent.com/nixbear/malicious_ips/refs/heads/main/malicious_ips.txt",
              "ufukart_blacklist":    "https://raw.githubusercontent.com/ufukart/Blacklist/main/blacklist.txt",
              "f3csystems":           "https://raw.githubusercontent.com/f3csystems/BlockList_IP/refs/heads/main/blacklist.txt",
              "fortigate_azure":      "https://raw.githubusercontent.com/IT3ngineer/FortigateBlockList/refs/heads/main/AzureBlockListIPs.txt",
              "romainmarcoux_aa":     "https://raw.githubusercontent.com/romainmarcoux/malicious-ip/main/full-300k-aa.txt",
              "romainmarcoux_ab":     "https://raw.githubusercontent.com/romainmarcoux/malicious-ip/main/full-300k-ab.txt",
              "romainmarcoux_ac":     "https://raw.githubusercontent.com/romainmarcoux/malicious-ip/main/full-300k-ac.txt",
              "4ip_high_security":    "https://raw.githubusercontent.com/4IP-Solutions/threat-feeds/refs/heads/main/blocklist-incoming-ip-high-security.txt",
              "cyna_malicious":       "https://raw.githubusercontent.com/cybersecurity-cyna/Malicious_IP/refs/heads/main/ip-list.txt",
              "black_mirror":         "https://github.com/T145/black-mirror/releases/download/latest/BLOCK_IPV4.txt",
          }

          DNS_WHITELIST = {
              "8.8.8.8", "8.8.4.4", "1.1.1.1", "1.0.0.1",
              "208.67.222.222", "208.67.220.220", "9.9.9.9",
              "149.112.112.112", "94.140.14.14", "94.140.15.15",
          }

          IPV4_RE = re.compile(r"\b((?:\d{1,3}\.){3}\d{1,3})\b")

          def is_valid_public_ipv4(ip):
              try:
                  obj = ipaddress.ip_address(ip)
                  return (
                      obj.version == 4 and
                      not obj.is_private and
                      not obj.is_loopback and
                      not obj.is_multicast and
                      not obj.is_unspecified and
                      not obj.is_reserved and
                      not obj.is_link_local
                  )
              except Exception:
                  return False

          def fetch_ips(name, url):
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "NETSHIELD/2.0"})
                  # Redirects folgen (wichtig für GitHub Release-Links)
                  opener = urllib.request.build_opener(urllib.request.HTTPRedirectHandler())
                  with opener.open(req, timeout=25) as r:
                      content = r.read().decode("utf-8", errors="ignore")
                  found = set()
                  for line in content.splitlines():
                      line = line.strip()
                      if not line or line.startswith("#") or line.startswith(";"):
                          continue
                      for m in IPV4_RE.finditer(line):
                          ip = m.group(1)
                          if ip not in DNS_WHITELIST and is_valid_public_ipv4(ip):
                              found.add(ip)
                  print(f"OK  {name}: {len(found)} IPs")
                  return name, found
              except Exception as e:
                  print(f"ERR {name}: {e}")
                  return name, set()

          all_ips = set()
          feed_stats = []

          # Alle Feeds parallel laden (max 10 gleichzeitig)
          with ThreadPoolExecutor(max_workers=10) as executor:
              futures = {executor.submit(fetch_ips, name, url): name for name, url in SOURCES.items()}
              for future in as_completed(futures):
                  name, ips = future.result()
                  all_ips.update(ips)
                  feed_stats.append((name, len(ips)))

          sorted_ips = sorted(all_ips)
          feed_stats.sort(key=lambda x: -x[1])

          with open("combined_threat_blacklist_ipv4.txt", "w", encoding="utf-8") as f:
              f.write("# Combined Threat Blacklist (IPv4)\n")
              f.write(f"# Aktualisiert: {now_stamp}\n")
              f.write(f"# Feeds: {len(SOURCES)}\n")
              f.write(f"# Eintraege: {len(sorted_ips)}\n\n")
              f.write("\n".join(sorted_ips) + "\n")

          with open("combined_threat_blacklist_report.md", "w", encoding="utf-8") as f:
              f.write("# Combined Threat Blacklist Report\n\n")
              f.write(f"- Aktualisiert: **{now_stamp}**\n")
              f.write(f"- Feeds gesamt: **{len(SOURCES)}**\n")
              f.write(f"- Eintraege gesamt: **{len(sorted_ips)}**\n\n")
              f.write("## Feed-Statistik\n\n")
              f.write("| Feed | IPs |\n|---|---:|\n")
              for name, count in feed_stats:
                  f.write(f"| `{name}` | {count} |\n")

          print(f"\nFertig! {len(sorted_ips)} IPs aus {len(SOURCES)} Feeds")
          EOF

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add combined_threat_blacklist_ipv4.txt combined_threat_blacklist_report.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update combined threat blacklist [$(date -u '+%Y-%m-%d %H:%M') UTC]"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
