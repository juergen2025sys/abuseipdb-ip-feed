name: Confidence Blacklist

on:
  schedule:
    - cron: '30 0 * * *'    # täglich 00:30 UTC (30 Min nach Combined – sicher nach Cache-Save)
    - cron: '30 3 * * *'    # täglich 03:30 UTC (30 Min nach Combined-Lauf um 03:00)
    - cron: '30 6 * * *'    # täglich 06:30 UTC (30 Min nach Combined-Lauf um 06:00)
    - cron: '30 9 * * *'    # täglich 09:30 UTC
    - cron: '30 12 * * *'   # täglich 12:30 UTC
    - cron: '30 15 * * *'   # täglich 15:30 UTC
    - cron: '30 18 * * *'   # täglich 18:30 UTC
    - cron: '30 21 * * *'   # täglich 21:30 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: read
  issues: none
  packages: none
  pull-requests: none
  security-events: none

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  update-confidence:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: true

      - name: Restore seen_db Cache
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: seen_db.json
          # FIX: restore-keys matcht jetzt alle Varianten die Combined schreibt
          # Combined speichert: netshield-seen-db-v1-<run_id>
          # Durch restore-keys holen wir immer den neuesten verfügbaren Cache
          key: netshield-seen-db-v1-latest
          restore-keys: |
            netshield-seen-db-v1-
            netshield-seen-db-

      - name: Build Confidence Blacklists from seen_db
        run: |
          python3 << 'EOF'
          import json, os, sys
          from datetime import datetime, timezone, timedelta

          now     = datetime.now(timezone.utc)
          now_str = now.strftime("%Y-%m-%d %H:%M UTC")

          DB_FILE    = "seen_db.json"
          BLACKLIST  = "combined_threat_blacklist_ipv4.txt"
          OUT_40     = "blacklist_confidence40_ipv4.txt"
          OUT_WATCH  = "watchlist_confidence20to39_ipv4.txt"

          if not os.path.exists(DB_FILE):
              print(f"FEHLER: {DB_FILE} nicht gefunden – bitte zuerst Update Combined Blacklist ausführen.")
              sys.exit(1)

          with open(DB_FILE) as f:
              db = json.load(f)
          print(f"seen_db geladen: {len(db)} IPs")

          # Alter der seen_db prüfen
          newest_last = max((d.get("last","2000-01-01") for d in db.values()), default="2000-01-01")
          try:
              newest_dt = datetime.strptime(newest_last, "%Y-%m-%d").replace(tzinfo=timezone.utc)
              db_age_hours = (now - newest_dt).total_seconds() / 3600
              print(f"seen_db aktuellster Eintrag: {newest_last} ({db_age_hours:.1f}h alt)")
              if db_age_hours > 6:
                  print(f"WARNUNG: seen_db ist {db_age_hours:.1f}h alt – Cache möglicherweise veraltet!")
          except Exception:
              pass

          if not os.path.exists(BLACKLIST):
              print(f"FEHLER: {BLACKLIST} nicht gefunden!")
              sys.exit(1)

          with open(BLACKLIST) as f:
              combined_ips = {l.strip() for l in f if l.strip() and not l.startswith("#")}
          print(f"Combined Blacklist: {len(combined_ips)} IPs")

          # ══════════════════════════════════════════════════════════════════
          # KONFIDENZ-MODELL
          #
          # confidence40 = qualitativ beste Liste, wenig False Positives
          # watchlist    = neue/unsichere Bedrohungen, höheres FP-Risiko
          #
          # Score setzt sich aus 4 unabhängigen Dimensionen zusammen:
          #
          # [A] QUELLEN-QUALITÄT (max. 40 Punkte) – wie vertrauenswürdig sind
          #     die Feeds die diese IP gemeldet haben?
          #       hq=True (je in einem HQ-Feed)          → 40
          #       today_count >= 5 (heute 5+ Feeds)      → 35
          #       today_count >= 3 (heute 3+ Feeds)      → 28
          #       today_count >= 2 (heute 2+ Feeds)      → 20
          #       feed_count >= 5 (akkum. 5+ Feeds)      → 15
          #       feed_count >= 3 (akkum. 3+ Feeds)      → 10
          #       feed_count >= 2 (akkum. 2 Feeds)       →  5
          #       1 Feed total                            →  0
          #
          # [B] AKTUALITÄT (max. 30 Punkte) – wie frisch ist die letzte
          #     *starke* Bestätigung? ("last" wurde oben nur gesetzt wenn
          #     2+ Feeds oder 1 HQ-Feed an diesem Tag)
          #       last_seen ≤ 1 Tag   → 30
          #       last_seen ≤ 3 Tage  → 25
          #       last_seen ≤ 7 Tage  → 20
          #       last_seen ≤ 14 Tage → 12
          #       last_seen ≤ 30 Tage →  6
          #       last_seen > 30 Tage →  0
          #
          # [C] PERSISTENZ (max. 20 Punkte) – wurde die IP über mehrere Tage
          #     unabhängig bestätigt? (days_seen = Anzahl verschiedener Tage
          #     an denen "stark bestätigt" wurde)
          #       days_seen >= 14     → 20
          #       days_seen >= 7      → 15
          #       days_seen >= 3      → 10
          #       days_seen >= 2      →  6
          #       days_seen == 1      →  2
          #
          # [D] BEKANNT SEIT (max. 10 Punkte) – wie lange ist die IP schon
          #     im System?
          #       bekannt ≥ 90 Tage   → 10
          #       bekannt ≥ 30 Tage   →  6
          #       bekannt ≥ 14 Tage   →  3
          #       bekannt < 14 Tage   →  0
          #
          # Gesamt max. 100 Punkte.
          # Schwellwerte:
          #   conf >= 50 → blacklist_confidence40 (umbenannt zu _confidence50 wäre
          #                besser, aber Dateiname bleibt für Kompatibilität)
          #   conf 25–49 → watchlist
          #   conf < 25  → ignoriert
          # ══════════════════════════════════════════════════════════════════

          confidence40 = []
          confidence20 = []
          skipped      = 0
          skipped_watchlist = 0

          for ip, data in db.items():
              if ip not in combined_ips:
                  continue

              is_hq       = data.get("hq", False)
              feed_count  = len(data.get("feeds", []))
              today_count = data.get("today_count", 0)
              today_hq    = data.get("today_hq", False)
              days_seen   = data.get("days_seen", 1)
              last_seen   = data.get("last",  "2000-01-01")
              first_seen  = data.get("first", last_seen)

              try:
                  last_dt  = datetime.strptime(last_seen,  "%Y-%m-%d").replace(tzinfo=timezone.utc)
                  first_dt = datetime.strptime(first_seen, "%Y-%m-%d").replace(tzinfo=timezone.utc)
              except Exception:
                  skipped += 1
                  continue

              # Watchlist-IPs (last="2000-01-01", hq=False) haben keine HQ-Bestätigung.
              # score_b wird 0 → landen unter Schwelle 25 → lautlos ignoriert.
              # Explizit zählen für den Report.
              if last_seen == "2000-01-01" and not is_hq:
                  skipped_watchlist += 1

              days_since_last = (now - last_dt).days
              days_known      = (now - first_dt).days + 1

              # [A] Quellen-Qualität
              if is_hq:
                  score_a = 40
              elif today_count >= 5:
                  score_a = 35
              elif today_count >= 3:
                  score_a = 28
              elif today_count >= 2:
                  score_a = 20
              elif feed_count >= 5:
                  score_a = 15
              elif feed_count >= 3:
                  score_a = 10
              elif feed_count >= 2:
                  score_a = 5
              else:
                  score_a = 0

              # [B] Aktualität
              if days_since_last <= 1:
                  score_b = 30
              elif days_since_last <= 3:
                  score_b = 25
              elif days_since_last <= 7:
                  score_b = 20
              elif days_since_last <= 14:
                  score_b = 12
              elif days_since_last <= 30:
                  score_b = 6
              else:
                  score_b = 0

              # [C] Persistenz (Multi-Tag-Bestätigung)
              if days_seen >= 14:
                  score_c = 20
              elif days_seen >= 7:
                  score_c = 15
              elif days_seen >= 3:
                  score_c = 10
              elif days_seen >= 2:
                  score_c = 6
              else:
                  score_c = 2

              # [D] Bekannt seit
              if days_known >= 90:
                  score_d = 10
              elif days_known >= 30:
                  score_d = 6
              elif days_known >= 14:
                  score_d = 3
              else:
                  score_d = 0

              conf = min(score_a + score_b + score_c + score_d, 100)

              if conf >= 50:
                  confidence40.append((ip, conf))
              elif conf >= 25:
                  confidence20.append((ip, conf))

          confidence40.sort(key=lambda x: (-x[1], x[0]))
          confidence20.sort(key=lambda x: (-x[1], x[0]))

          print(f"Konfidenz ≥50 (→ confidence40-Datei): {len(confidence40)} IPs")
          print(f"Konfidenz 25-49 (→ watchlist):         {len(confidence20)} IPs")
          print(f"Watchlist (kein HQ, last=2000-01-01):  {skipped_watchlist} IPs (Score zu niedrig, ausstehend)")
          print(f"Übersprungen:                          {skipped} IPs (Datumsfehler)")

          with open(OUT_40, "w") as f:
              f.write(f"# NETSHIELD Blacklist – Hohe Konfidenz (Score ≥50/100)\n")
              f.write(f"# Aktualisiert: {now_str}\n")
              f.write(f"# Scoring: Quellen-Qualität(40) + Aktualität(30) + Persistenz(20) + Alter(10)\n")
              f.write(f"# Eintraege: {len(confidence40)}\n\n")
              for ip, conf in confidence40:
                  f.write(f"{ip}\n")

          with open(OUT_WATCH, "w") as f:
              f.write(f"# NETSHIELD Watchlist – Mittlere Konfidenz (Score 25-49/100)\n")
              f.write(f"# Aktualisiert: {now_str}\n")
              f.write(f"# Eintraege: {len(confidence20)}\n\n")
              for ip, conf in confidence20:
                  f.write(f"{ip}\n")

          print(f"Fertig: {len(confidence40)} IPs (conf40) | {len(confidence20)} IPs (watchlist)")
          EOF

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blacklist_confidence40_ipv4.txt watchlist_confidence20to39_ipv4.txt
          if git diff --staged --quiet; then
            echo "Keine Änderungen"
          else
            git commit -m "Confidence Blacklist: $(date -u '+%Y-%m-%d %H:%M') UTC"
            git pull --rebase origin ${GITHUB_REF_NAME}
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
