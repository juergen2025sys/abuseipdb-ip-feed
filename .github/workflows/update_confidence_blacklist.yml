name: Confidence Blacklist

on:
  schedule:
    - cron: '15 0 * * *'    # täglich 00:15 UTC (15 Min nach Combined)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: read
  issues: none
  packages: none
  pull-requests: none
  security-events: none


concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
jobs:
  update-confidence:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: true

      - name: Restore seen_db Cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: seen_db.json
          key: netshield-seen-db-v1
          restore-keys: |
            netshield-seen-db-

      - name: Build Confidence Blacklists from seen_db
        run: |
          python3 << 'EOF'
          import json, os
          from datetime import datetime, timezone, timedelta

          now     = datetime.now(timezone.utc)
          now_str = now.strftime("%Y-%m-%d %H:%M UTC")

          DB_FILE    = "seen_db.json"
          BLACKLIST  = "combined_threat_blacklist_ipv4.txt"
          OUT_40     = "blacklist_confidence40_ipv4.txt"
          OUT_WATCH  = "watchlist_confidence20to39_ipv4.txt"

          if not os.path.exists(DB_FILE):
              print(f"FEHLER: {DB_FILE} nicht gefunden – bitte zuerst Update Combined Blacklist ausführen.")
              exit(1)

          with open(DB_FILE) as f:
              db = json.load(f)
          print(f"seen_db geladen: {len(db)} IPs")

          if not os.path.exists(BLACKLIST):
              print(f"FEHLER: {BLACKLIST} nicht gefunden!")
              exit(1)

          with open(BLACKLIST) as f:
              combined_ips = {l.strip() for l in f if l.strip() and not l.startswith("#")}
          print(f"Combined Blacklist: {len(combined_ips)} IPs")

          # Konfidenz-Berechnung:
          # HQ-Feed = Basis 60% | 2+ Feeds = Basis 40%
          # +20% wenn letzten 7 Tage | +10% wenn letzten 30 Tage
          # +10% wenn 30+ Tage bekannt | +5% wenn 14+ Tage bekannt

          confidence40 = []
          confidence20 = []

          for ip, data in db.items():
              if ip not in combined_ips:
                  continue
              is_hq      = data.get("hq", False)
              last_seen  = data.get("last",  "2000-01-01")
              first_seen = data.get("first", last_seen)
              try:
                  last_dt  = datetime.strptime(last_seen,  "%Y-%m-%d").replace(tzinfo=timezone.utc)
                  first_dt = datetime.strptime(first_seen, "%Y-%m-%d").replace(tzinfo=timezone.utc)
              except:
                  continue

              days_since_last = (now - last_dt).days
              days_known      = (last_dt - first_dt).days + 1
              conf = 60 if is_hq else 40

              if days_since_last <= 7:
                  conf += 20
              elif days_since_last <= 30:
                  conf += 10

              if days_known >= 30:
                  conf += 10
              elif days_known >= 14:
                  conf += 5

              conf = min(conf, 100)

              if conf >= 40:
                  confidence40.append((ip, conf))
              elif conf >= 20:
                  confidence20.append((ip, conf))

          confidence40.sort(key=lambda x: (-x[1], x[0]))
          confidence20.sort(key=lambda x: (-x[1], x[0]))

          print(f"Konfidenz ≥40%: {len(confidence40)} IPs")
          print(f"Konfidenz 20-39%: {len(confidence20)} IPs")

          with open(OUT_40, "w") as f:
              f.write(f"# NETSHIELD Blacklist – Hohe Konfidenz (≥40%)\n")
              f.write(f"# Aktualisiert: {now_str}\n")
              f.write(f"# Eintraege: {len(confidence40)}\n\n")
              for ip, conf in confidence40:
                  f.write(f"{ip}\n")

          with open(OUT_WATCH, "w") as f:
              f.write(f"# NETSHIELD Watchlist – Mittlere Konfidenz (20-39%)\n")
              f.write(f"# Aktualisiert: {now_str}\n")
              f.write(f"# Eintraege: {len(confidence20)}\n\n")
              for ip, conf in confidence20:
                  f.write(f"{ip}\n")

          print(f"Fertig: {len(confidence40)} IPs (≥40%) | {len(confidence20)} IPs (20-39%)")
          EOF

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blacklist_confidence40_ipv4.txt watchlist_confidence20to39_ipv4.txt
          if git diff --staged --quiet; then
            echo "Keine Änderungen"
          else
            git commit -m "Confidence Blacklist: $(date -u '+%Y-%m-%d %H:%M') UTC"
            git pull --rebase origin ${GITHUB_REF_NAME}
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
