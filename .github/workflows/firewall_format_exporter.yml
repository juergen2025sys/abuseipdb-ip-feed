name: Firewall Format Exporter

on:
  schedule:
    - cron: '30 0 * * *'    # täglich 00:30 UTC (30 Min nach Combined)
  workflow_dispatch:

permissions:
  contents: write


concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          persist-credentials: true

      - name: Generate Firewall Export Files
        run: |
          python3 << 'EOF'
          import os, json
          from datetime import datetime, timezone

          now     = datetime.now(timezone.utc)
          now_str = now.strftime("%Y-%m-%d %H:%M UTC")
          now_iso = now.strftime("%Y-%m-%dT%H:%M:%SZ")

          # active_blacklist verwenden (Stufe 2 – kleiner, schnell, OPNsense-tauglich)
          BLACKLIST = "active_blacklist_ipv4.txt"
          if not os.path.exists(BLACKLIST):
              BLACKLIST = "combined_threat_blacklist_ipv4.txt"
              print(f"HINWEIS: active_blacklist nicht gefunden – verwende combined")
          if not os.path.exists(BLACKLIST):
              print(f"FEHLER: Keine Blacklist gefunden!")
              exit(1)

          ips = []
          with open(BLACKLIST) as f:
              for line in f:
                  line = line.strip()
                  if line and not line.startswith("#"):
                      ips.append(line)

          if not ips:
              print("WARNUNG: Blacklist leer – Export übersprungen.")
              exit(0)

          print(f"Blacklist geladen: {len(ips)} IPs (aus {BLACKLIST})")
          os.makedirs("firewall_exports", exist_ok=True)

          # 1. JSON
          with open("firewall_exports/blacklist.json", "w") as f:
              json.dump({"name": "NETSHIELD Active Blacklist", "updated": now_iso,
                         "source": "https://github.com/juergen2025sys/NETSHIELD",
                         "count": len(ips), "ips": ips}, f, indent=2)
          print(f"  OK: blacklist.json ({len(ips)} IPs)")

          # 2. CSV
          with open("firewall_exports/blacklist.csv", "w", encoding="utf-8") as f:
              f.write("ip,type,source,updated\n")
              for ip in ips:
                  f.write(f"{ip},IPv4,NETSHIELD,{now_str}\n")
          print(f"  OK: blacklist.csv")

          # 3. iptables
          with open("firewall_exports/blacklist_iptables.sh", "w") as f:
              f.write(f"#!/bin/bash\n# NETSHIELD Blacklist – iptables | {now_str}\n")
              f.write("iptables -F NETSHIELD 2>/dev/null || iptables -N NETSHIELD\n")
              f.write("iptables -C INPUT -j NETSHIELD 2>/dev/null || iptables -I INPUT -j NETSHIELD\n")
              f.write("iptables -C FORWARD -j NETSHIELD 2>/dev/null || iptables -I FORWARD -j NETSHIELD\n\n")
              for ip in ips:
                  f.write(f"iptables -A NETSHIELD -s {ip} -j DROP\n")
          print(f"  OK: blacklist_iptables.sh")

          # 4. nftables
          with open("firewall_exports/blacklist_nftables.conf", "w") as f:
              f.write(f"# NETSHIELD Blacklist – nftables | {now_str}\n")
              f.write("table inet netshield {\n    set blacklist_ipv4 {\n        type ipv4_addr\n        flags interval\n        elements = {\n")
              for chunk in [ips[i:i+10] for i in range(0, len(ips), 10)]:
                  f.write("            " + ", ".join(chunk) + ",\n")
              f.write("        }\n    }\n    chain input {\n        type filter hook input priority 0; policy accept;\n        ip saddr @blacklist_ipv4 drop\n    }\n}\n")
          print(f"  OK: blacklist_nftables.conf")

          # 5. pfSense / OPNsense XML
          with open("firewall_exports/blacklist_pfsense_opnsense.xml", "w") as f:
              f.write('<?xml version="1.0"?>\n')
              f.write(f'<!-- NETSHIELD Blacklist | {now_str} -->\n<aliases>\n  <alias>\n')
              f.write('    <n>NETSHIELD_Blacklist</n>\n    <type>host</type>\n')
              f.write(f'    <description>NETSHIELD Active Blacklist – {now_str}</description>\n')
              f.write(f'    <address>{" ".join(ips)}</address>\n')
              f.write(f'    <detail>{"||".join(f"NETSHIELD {ip}" for ip in ips)}</detail>\n')
              f.write('  </alias>\n</aliases>\n')
          print(f"  OK: blacklist_pfsense_opnsense.xml")

          # 6. Cisco ACL
          with open("firewall_exports/blacklist_cisco_acl.txt", "w", encoding="utf-8") as f:
              f.write(f"! NETSHIELD Blacklist – Cisco ACL | {now_str}\nip access-list extended NETSHIELD_BLACKLIST\n")
              for ip in ips:
                  f.write(f" deny   ip host {ip} any log\n")
              f.write(" permit ip any any\n")
          print(f"  OK: blacklist_cisco_acl.txt")

          # 7. Mikrotik
          with open("firewall_exports/blacklist_mikrotik.rsc", "w") as f:
              f.write(f"# NETSHIELD Blacklist – Mikrotik RouterOS | {now_str}\n")
              f.write("/ip firewall address-list remove [find list=NETSHIELD_Blacklist]\n\n")
              for ip in ips:
                  f.write(f'/ip firewall address-list add list=NETSHIELD_Blacklist address={ip} comment="NETSHIELD"\n')
          print(f"  OK: blacklist_mikrotik.rsc")

          # 8. Windows Firewall PowerShell
          with open("firewall_exports/blacklist_windows_firewall.ps1", "w") as f:
              f.write(f"# NETSHIELD Blacklist – Windows Firewall | {now_str}\n")
              f.write('Remove-NetFirewallRule -DisplayName "NETSHIELD_Blacklist" -ErrorAction SilentlyContinue\n')
              f.write("$ips = @(\n")
              for chunk in [ips[i:i+10] for i in range(0, len(ips), 10)]:
                  f.write('    "' + '","'.join(chunk) + '",\n')
              f.write(")\nNew-NetFirewallRule -DisplayName \"NETSHIELD_Blacklist\" -Direction Inbound -Action Block -RemoteAddress $ips\n")
          print(f"  OK: blacklist_windows_firewall.ps1")

          # README
          with open("firewall_exports/README.md", "w", encoding="utf-8") as f:
              f.write(f"# NETSHIELD Firewall Exports\n\n**Aktualisiert:** {now_str}  \n**IPs:** {len(ips)}\n\n")
              f.write("| Datei | Format | Verwendung |\n|---|---|---|\n")
              f.write("| `blacklist.json` | JSON | APIs, SIEM |\n")
              f.write("| `blacklist.csv` | CSV | Excel, Datenbanken |\n")
              f.write("| `blacklist_iptables.sh` | iptables | Linux |\n")
              f.write("| `blacklist_nftables.conf` | nftables | Linux (modern) |\n")
              f.write("| `blacklist_pfsense_opnsense.xml` | XML Alias | pfSense / OPNsense |\n")
              f.write("| `blacklist_cisco_acl.txt` | Cisco ACL | Cisco IOS |\n")
              f.write("| `blacklist_mikrotik.rsc` | RouterOS | Mikrotik |\n")
              f.write("| `blacklist_windows_firewall.ps1` | PowerShell | Windows |\n\n")
              f.write(f"*Generiert von NETSHIELD Firewall Format Exporter · {now_str}*\n")

          print(f"\nAlle Exporte fertig: 8 Formate × {len(ips)} IPs")
          EOF

      - name: Commit Exports (mit Git LFS für große Dateien)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Git LFS für Dateien > 50 MB aktivieren
          git lfs install --skip-smudge 2>/dev/null || true
          git lfs track "firewall_exports/blacklist.csv"                 2>/dev/null || true
          git lfs track "firewall_exports/blacklist_iptables.sh"         2>/dev/null || true
          git lfs track "firewall_exports/blacklist_mikrotik.rsc"        2>/dev/null || true
          git lfs track "firewall_exports/blacklist_cisco_acl.txt"       2>/dev/null || true
          git lfs track "firewall_exports/blacklist_pfsense_opnsense.xml" 2>/dev/null || true
          git add .gitattributes 2>/dev/null || true

          git add firewall_exports/
          if git diff --staged --quiet; then
            echo "Keine Änderungen"
          else
            git commit -m "Firewall Format Exporter: $(date -u '+%Y-%m-%d %H:%M') UTC"
            git pull --rebase origin ${GITHUB_REF_NAME}
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
