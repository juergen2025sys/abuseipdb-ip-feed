name: False Positive Checker

on:
  schedule:
    - cron: '0 6 * * *'   # täglich 06:00 UTC
    - cron: '0 14 * * *'  # täglich 14:00 UTC
    - cron: '0 22 * * *'  # täglich 22:00 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: read
  issues: none
  packages: none
  pull-requests: none
  security-events: none


concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
jobs:
  fp-checker:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: true

      - name: Check Blacklist for False Positives
        run: |
          python3 << 'EOF'
          import re
          import os
          import ipaddress
          from datetime import datetime, timezone

          now = datetime.now(timezone.utc)
          now_str = now.strftime("%Y-%m-%d %H:%M UTC")

          # Majestic Million entfernt – Whitelist-CIDR + Reverse-DNS reicht aus
          print("Starte False Positive Prüfung (Whitelist + Reverse-DNS)...")

          # ── Bekannte legitime IP-Ranges (Whitelist) ───────────────────────
          WHITELIST_CIDRS = [
              # Google (Search, Gmail, Drive, Meet, YouTube)
              "8.8.8.0/24", "8.8.4.0/24", "8.34.208.0/20", "8.35.192.0/20",
              "34.0.0.0/9", "35.184.0.0/13",
              "142.250.0.0/15", "142.251.0.0/16",   # Google Services (142.251.x.x)
              "172.217.0.0/16", "172.253.0.0/16",   # Google Services (172.217.x.x)
              "216.58.192.0/19",
              "74.125.0.0/16", "66.102.0.0/20",
              # Cloudflare
              "1.1.1.0/24", "1.0.0.0/24", "104.16.0.0/13", "104.24.0.0/14",
              "172.64.0.0/13", "162.158.0.0/15", "198.41.128.0/17",
              "104.18.0.0/15",                       # Cloudflare (104.18.x.x)
              "172.64.155.0/24",                     # Cloudflare (172.64.155.x)
              # Microsoft / Office365 / Teams
              "13.64.0.0/11", "13.96.0.0/13", "40.64.0.0/10",
              "52.96.0.0/14", "52.100.0.0/14",       # Office365 / Exchange Online
              "52.108.0.0/14", "52.112.0.0/14",      # Microsoft Teams / Skype
              "52.120.0.0/14",                        # Microsoft (52.109.x.x liegt hier drin)
              "104.40.0.0/13", "104.146.0.0/15",
              # Amazon AWS (öffentliche Dienste)
              "54.239.28.0/23", "54.239.192.0/19",
              # Akamai CDN
              "23.0.0.0/12", "23.32.0.0/11",
              # Fastly CDN
              "151.101.0.0/16",
              # Facebook / Meta (WhatsApp, Instagram)
              "157.240.0.0/16",                      # Facebook/Meta (157.240.x.x)
              "179.60.192.0/22", "185.60.216.0/22",
              "31.13.24.0/21", "31.13.64.0/18",
              "69.63.176.0/20", "69.171.224.0/19",
              # GitHub
              "140.82.112.0/20",                     # GitHub (140.82.121.x)
              "185.199.108.0/22",                    # GitHub Pages/CDN (185.199.x.x)
              "192.30.252.0/22",
              # Apple
              "17.0.0.0/8",
              # Weitere CDNs / legitime Dienste
              "80.146.0.0/16",                       # Telekom Deutschland
              "91.228.164.0/22",                     # legitimer Hoster (91.228.166/167.x)
              "184.105.0.0/16",                      # Hurricane Electric
              "141.8.192.0/21",                      # Google Cloud
              "192.64.80.0/20",                      # Tucows / OpenSRS
              # Shopify CDN
              "185.111.111.0/24",                    # Shopify CDN (185.111.111.x)
              "23.227.36.0/22",                      # Shopify CDN (23.227.38.x)
              "160.79.104.0/21",                     # Shopify (160.79.104.x)
          ]

          whitelist_networks = []
          for cidr in WHITELIST_CIDRS:
              try:
                  whitelist_networks.append(ipaddress.ip_network(cidr, strict=False))
              except:
                  pass

          def is_whitelisted(ip):
              try:
                  addr = ipaddress.ip_address(ip)
                  return any(addr in net for net in whitelist_networks)
              except:
                  return False

          # ── Blacklist laden ───────────────────────────────────────────────
          BLACKLIST = "combined_threat_blacklist_ipv4.txt"
          if not os.path.exists(BLACKLIST):
              print(f"FEHLER: {BLACKLIST} nicht gefunden!")
              exit(1)

          with open(BLACKLIST) as f:
              lines_raw = f.readlines()

          blacklist_ips = []
          for line in lines_raw:
              ip = line.strip()
              if ip and not ip.startswith("#"):
                  blacklist_ips.append(ip)

          print(f"\nBlacklist geladen: {len(blacklist_ips)} IPs")
          print("Prüfe auf False Positives...")

          # ── False-Positive-Erkennung (nur Whitelist-CIDR) ────────────────
          false_positives   = []
          whitelist_hits    = []
          reverse_dns_legit = []

          print(f"Prüfe {len(blacklist_ips)} IPs gegen Whitelist...")
          for i, ip in enumerate(blacklist_ips):
              if is_whitelisted(ip):
                  whitelist_hits.append((ip, "Bekannte legitime IP-Range (CDN/Cloud)"))
                  false_positives.append(ip)

          print(f"  Fertig. {len(false_positives)} False Positives gefunden.")

          print(f"\nFalse Positives gefunden: {len(false_positives)}")
          print(f"  Whitelist-Treffer:    {len(whitelist_hits)}")
          print(f"  Reverse-DNS-Legit:    {len(reverse_dns_legit)}")

          # ── False Positives aus Blacklist entfernen ───────────────────────
          fp_set = set(false_positives)
          cleaned_lines = []
          removed_count = 0

          for line in lines_raw:
              ip = line.strip()
              if ip and not ip.startswith("#") and ip in fp_set:
                  removed_count += 1
                  continue  # rauslassen
              cleaned_lines.append(line)

          if removed_count > 0:
              with open(BLACKLIST, "w") as f:
                  f.writelines(cleaned_lines)
              print(f"Blacklist bereinigt: {removed_count} False Positives entfernt")
          else:
              print("Keine False Positives gefunden")

          # ── False Positive Liste speichern ────────────────────────────────
          with open("false_positives_log.txt", "a", encoding="utf-8") as f:
              f.write(f"\n# Scan: {now_str} – {removed_count} entfernt\n")
              for ip in false_positives:
                  f.write(f"{ip}\n")

          # ── Report ────────────────────────────────────────────────────────
          lines = []
          lines.append("# False Positive Checker – Report")
          lines.append(f"**Aktualisiert:** {now_str}\n")
          lines.append("---")
          lines.append("## Ergebnis\n")
          lines.append(f"| Metrik | Wert |")
          lines.append(f"|---|---|")
          lines.append(f"| Geprüfte IPs (gesamt) | {len(blacklist_ips)} |")
          lines.append(f"| Whitelist-Treffer | **{len(whitelist_hits)}** |")
          lines.append(f"| Reverse-DNS legitim | **{len(reverse_dns_legit)}** |")
          lines.append(f"| Gesamt entfernt | **{removed_count}** |")

          if whitelist_hits:
              lines.append("")
              lines.append("## Whitelist-Treffer\n")
              lines.append("| IP | Grund |")
              lines.append("|---|---|")
              for ip, reason in whitelist_hits[:20]:
                  lines.append(f"| `{ip}` | {reason} |")

          if reverse_dns_legit:
              lines.append("")
              lines.append("## Legitime Reverse-DNS-Einträge\n")
              lines.append("| IP | Hostname |")
              lines.append("|---|---|")
              for ip, hostname in reverse_dns_legit[:20]:
                  lines.append(f"| `{ip}` | `{hostname}` |")

          lines.append(f"\n---\n*Generiert: {now_str}*")

          with open("false_positive_report.md", "w", encoding="utf-8") as f:
              f.write("\n".join(lines))
          print("false_positive_report.md geschrieben")
          EOF

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add false_positives_log.txt false_positive_report.md combined_threat_blacklist_ipv4.txt
          git diff --staged --quiet || git commit -m "False Positive Check abgeschlossen [$(date -u '+%Y-%m-%d %H:%M') UTC]"
          git pull --rebase origin ${GITHUB_REF_NAME}
          git push origin HEAD:${GITHUB_REF_NAME}
