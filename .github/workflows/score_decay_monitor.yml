name: Score Decay Monitor

on:
  schedule:
    - cron: '0 7 * * 0'    # wöchentlich Sonntag 07:00 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: read
  issues: none
  packages: none
  pull-requests: none
  security-events: none


concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
jobs:
  score-decay:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: true

      - name: Restore seen_db Cache
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: seen_db.json
          key: netshield-seen-db-v1-latest
          restore-keys: |
            netshield-seen-db-v1-
            netshield-seen-db-

      - name: Run Score Decay Analysis
        run: |
          python3 << 'EOF'
          import json, os, re
          from datetime import datetime, timezone, timedelta
          from collections import defaultdict

          now     = datetime.now(timezone.utc)
          now_str = now.strftime("%Y-%m-%d %H:%M UTC")

          DB_FILE   = "seen_db.json"


          if not os.path.exists(DB_FILE):
              print("FEHLER: seen_db.json nicht gefunden")
              with open("score_decay_report.md", "w", encoding="utf-8") as f:
                  f.write("# Score Decay Monitor\n\n*seen_db.json nicht gefunden.*\n")
              exit(0)

          with open(DB_FILE) as f:
              db = json.load(f)
          print(f"seen_db geladen: {len(db)} IPs")

          WARN_DAYS     = 30
          CRITICAL_DAYS = 45
          # DECAY_DAYS entfernt – Löschen aus combined/seen_db ist ausschließlich
          # Aufgabe von combined (EXPIRY_DAYS=180). Score Decay ist reiner Monitor/Reporter.

          stale_warn     = []
          stale_critical = []
          decay_suggest  = []
          still_active   = []
          zombie_high    = []
          score_dist     = defaultdict(int)

          for ip, data in db.items():
              last_seen  = data.get("last",  "2000-01-01")
              first_seen = data.get("first", last_seen)
              is_hq      = data.get("hq", False)
              days_seen  = data.get("days_seen", 0)  # Anzahl Tage mit echter Bestätigung
              try:
                  last_dt  = datetime.strptime(last_seen,  "%Y-%m-%d").replace(tzinfo=timezone.utc)
                  first_dt = datetime.strptime(first_seen, "%Y-%m-%d").replace(tzinfo=timezone.utc)
              except:
                  continue
              days_ago    = (now - last_dt).days
              # Score basiert auf echten Bestätigungstagen (days_seen) + HQ-Bonus
              # Fallback auf days_active für alte Einträge ohne days_seen
              if days_seen == 0:
                  days_seen = (last_dt - first_dt).days + 1
              score       = days_seen + (20 if is_hq else 0)
              score_dist[(score // 5) * 5] += 1

              if days_ago <= 7:
                  still_active.append((ip, score, days_ago))
              if days_ago >= 150:
                  decay_suggest.append((ip, score, days_ago, last_seen))  # bald von combined entfernt (180T)
              elif days_ago >= CRITICAL_DAYS and score >= 10:
                  stale_critical.append((ip, score, days_ago, last_seen))
              elif days_ago >= WARN_DAYS and score >= 5:
                  stale_warn.append((ip, score, days_ago, last_seen))
              if score >= 20 and days_ago >= 30:
                  zombie_high.append((ip, score, days_ago, last_seen))

          for lst in (stale_critical, stale_warn, zombie_high, decay_suggest):
              lst.sort(key=lambda x: x[1], reverse=True)

          print(f"Kürzlich aktiv (≤7 Tage):       {len(still_active)}")
          print(f"Veraltend – Warnung (30-44 Tage): {len(stale_warn)}")
          print(f"Veraltend – Kritisch (45+ Tage):  {len(stale_critical)}")
          print(f"Zombie (Score≥20, 30+ Tage):      {len(zombie_high)}")
          print(f"Entfernung empfohlen (30+ Tage):  {len(decay_suggest)}")

          # Decay-Log
          with open("score_decay_log.txt", "w", encoding="utf-8") as f:
              f.write(f"# Score Decay Log | {now_str}\n# DB: {len(db)} IPs\n\n")
              f.write("# ZOMBIE IPs (Score≥20, 30+ Tage inaktiv)\n")
              for ip, score, days, last in zombie_high[:100]:
                  f.write(f"{ip}  score={score}  last={last}  ({days}d ago)\n")
              f.write("\n# KRITISCH veraltend (45+ Tage, Score≥10)\n")
              for ip, score, days, last in stale_critical[:200]:
                  f.write(f"{ip}  score={score}  last={last}  ({days}d ago)\n")
              f.write("\n# Entfernung empfohlen (30+ Tage)\n")
              for ip, score, days, last in decay_suggest[:500]:
                  f.write(f"{ip}  score={score}  last={last}  ({days}d ago)\n")

          # Report
          lines = ["# Score Decay Monitor – Report", f"**Aktualisiert:** {now_str}\n", "---",
                   "## Übersicht\n",
                   "| Kategorie | IPs | Bedeutung |", "|---|---|---|",
                   f"| ✅ Kürzlich aktiv (≤7 Tage) | **{len(still_active)}** | Frische Bedrohungen |",
                   f"| 🟡 Veraltend – Warnung | **{len(stale_warn)}** | 30-44 Tage ohne Aktivität |",
                   f"| 🔴 Veraltend – Kritisch | **{len(stale_critical)}** | 45+ Tage ohne Aktivität |",
                   f"| 💀 Zombie | **{len(zombie_high)}** | Score≥20, 30+ Tage inaktiv |",
                   f"| ⏳ Läuft bald ab (150+ Tage) | **{len(decay_suggest)}** | combined entfernt bei 180 Tagen |",
                   "", "---",
                   "## ℹ️ Hinweis\nIPs werden **nicht** durch diesen Workflow gelöscht.\n"
                   "Das Entfernen aus combined + seen_db erfolgt ausschließlich durch\n"
                   "`update_combined_blacklist` nach **180 Tagen** ohne Feed-Bestätigung.\n",
                   f"---\n*Generiert: {now_str} | DB: {len(db)} IPs*"]

          with open("score_decay_report.md", "w", encoding="utf-8") as f:
              f.write("\n".join(lines))
          print("score_decay_report.md geschrieben")
          EOF

      - name: Save seen_db Cache
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: seen_db.json
          key: netshield-seen-db-v1-decay-${{ github.run_id }}

      - name: Save seen_db Cache (latest alias)
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: seen_db.json
          key: netshield-seen-db-v1-latest

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add score_decay_log.txt score_decay_report.md
          if git diff --staged --quiet; then
            echo "Keine Änderungen"
          else
            git commit -m "Score Decay Monitor: $(date -u '+%Y-%m-%d %H:%M') UTC"
            git pull --rebase origin ${GITHUB_REF_NAME}
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
