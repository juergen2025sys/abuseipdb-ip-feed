name: Bot-Detector Blacklist

on:
  schedule:
    - cron: '45 23 * * *'   # täglich 23:45 UTC (15 Min vor Combined um 00:00)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: read
  issues: none
  packages: none
  pull-requests: none
  security-events: none


concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true

      - name: Fetch Bot-Detector Blacklist
        run: |
          python3 << 'EOF'
          import urllib.request, json, sys
          from datetime import datetime, timezone

          now     = datetime.now(timezone.utc)
          now_str = now.strftime("%Y-%m-%d %H:%M UTC")

          url = "https://raw.githubusercontent.com/lula73/bot-detector/refs/heads/master/blacklist.json"
          try:
              req = urllib.request.Request(url, headers={"User-Agent": "NETSHIELD/3.0"})
              with urllib.request.urlopen(req, timeout=20) as r:
                  data = json.load(r)
              ips = [entry["ip"] for entry in data.get("blacklist", []) if "ip" in entry]
          except Exception as e:
              print(f"FEHLER: Bot-Detector Feed nicht erreichbar: {e}")
              print("Behalte bestehende bot_detector_blacklist_ipv4.txt")
              sys.exit(0)

          with open("bot_detector_blacklist_ipv4.txt", "w", encoding="utf-8") as f:
              f.write("# NETSHIELD Bot-Detector Blacklist\n")
              f.write(f"# Aktualisiert: {now_str}\n")
              f.write(f"# Quelle: github.com/lula73/bot-detector\n")
              f.write(f"# Eintraege: {len(ips)}\n\n")
              f.write("\n".join(ips) + "\n")
          print(f"Fertig: {len(ips)} Bot-IPs")
          EOF

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bot_detector_blacklist_ipv4.txt
          if git diff --staged --quiet; then
            echo "Keine Änderungen"
          else
            git commit -m "Bot-Detector Blacklist: $(date -u '+%Y-%m-%d %H:%M') UTC"
            git pull --rebase origin ${GITHUB_REF_NAME}
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
