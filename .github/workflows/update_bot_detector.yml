name: Update Bot-Detector Blacklist

on:
  schedule:
    - cron: '45 5,11,17,23 * * *'  # 15min vor Combined (5:45, 11:45, 17:45, 23:45)
  workflow_dispatch:        # manuell auslösbar

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Fetch & Convert Blacklist
        run: |
          python3 << 'EOF'
          import urllib.request
          import json
          from datetime import datetime, timezone

          url = "https://raw.githubusercontent.com/lula73/bot-detector/refs/heads/master/blacklist.json"
          try:
              req = urllib.request.Request(url, headers={"User-Agent": "NETSHIELD/2.0"})
              with urllib.request.urlopen(req, timeout=20) as r:
                  data = json.load(r)
              ips = [entry["ip"] for entry in data.get("blacklist", []) if "ip" in entry]
          except Exception as e:
              print(f"FEHLER: Bot-Detector Feed nicht erreichbar: {e}")
              print("Behalte bestehende bot_detector_blacklist_ipv4.txt")
              import sys; sys.exit(0)
          now = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")

          with open("bot_detector_blacklist_ipv4.txt", "w") as f:
              f.write("# Bot Detector Blacklist\n")
              f.write("# Source: github.com/lula73/bot-detector\n")
              f.write(f"# Updated: {now}\n")
              f.write(f"# Total IPs: {len(ips)}\n")
              f.write("\n".join(ips) + "\n")

          print(f"Saved {len(ips)} IPs.")
          EOF

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bot_detector_blacklist_ipv4.txt
          git diff --staged --quiet || git commit -m "Auto-update bot_detector_blacklist_ipv4.txt [$(date -u '+%Y-%m-%d %H:%M') UTC]"
          git push
